name: Docs (rspress → Pages)

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Pages needs `pages: write` + `id-token: write` on the deploying job.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel queued runs of the same branch.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install docs dependencies
        run: npm ci
        working-directory: docs
      - name: Build docs
        run: npm run build
        working-directory: docs
      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          # Auto-create the Pages site if it doesn't exist yet. Lets the workflow
          # bootstrap a fork or fresh clone without a manual Settings → Pages click,
          # and prevents the chicken-and-egg failure where the first push to main
          # races ahead of the repo-level Pages enablement.
          enablement: true
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/doc_build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
